<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Demo UI/UX Pertemuan 4</title><style>body{margin:0;font-family:Arial,sans-serif;background:#eef3f8;color:#173b66}main{max-width:1120px;margin:auto;padding:40px 20px}h1{text-align:center;font-size:42px}section{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.08);border-left:8px solid #1f5f99}.card:nth-child(2){border-color:#f28c28}.card:nth-child(3){border-color:#17a398}.wire{border:2px dashed #cad5e1;border-radius:18px;padding:18px;margin-top:16px}.bar{height:18px;background:#ddeaf7;border-radius:8px;margin:12px 0}.button{height:36px;width:120px;background:#f28c28;border-radius:10px;margin-top:20px}@media(max-width:800px){section{grid-template-columns:1fr}}</style></head><body><main><h1>Demo Low-Fidelity Prototype</h1><section><article class="card"><h2>Beranda</h2><div class="wire"><div class="bar"></div><div class="bar"></div><div class="button"></div></div></article><article class="card"><h2>Form Produk</h2><div class="wire"><div class="bar"></div><div class="bar" style="height:80px"></div><div class="button"></div></div></article><article class="card"><h2>Hasil Caption</h2><div class="wire"><div class="bar" style="height:120px"></div><div class="button"></div></div></article></section></main></body></html>
